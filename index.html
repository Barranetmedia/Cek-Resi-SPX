<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Resi SPX Barranetmedia</title>
<link rel="icon" type="image/png" href="favicon.png">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --ink:#1c2128;
    --paper:#FBF7F2;
    --line:#e8e0d8;
    --accent:#ee4d2d;
    --accent-dark:#c9401f;
    --accent-soft:#fff0e6;
    --green:#16a34a;
    --green-soft:#e9f7ee;
    --green-text:#15803d;
    --yellow:#FFC629;
    --yellow-soft:#FFF6DA;
    --yellow-text:#8A6300;
    --red:#dc2626;
    --red-soft:#FCEBEB;
    --red-text:#791F1F;
    --wa:#25D366;
    --mono:'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding:0 0 80px;
  }
  .wrap{max-width:760px;margin:0 auto;padding:16px 16px 0;}
  header{
    margin:0 0 6px;
    border-radius:0 0 16px 16px;
    overflow:hidden;
    background:linear-gradient(135deg, var(--accent) 0%, #ff7a45 100%);
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.25) 1.6px, transparent 1.6px),
      linear-gradient(135deg, var(--accent) 0%, #ff7a45 100%);
    background-size:20px 20px, cover;
    padding:14px 20px;
    text-align:center;
  }
  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:#fff;
    background:rgba(255,255,255,0.2);
    font-weight:600;
    padding:4px 10px;
    border-radius:999px;
    margin-bottom:7px;
  }
  h1{font-size:18px;margin:0 0 2px;font-weight:700;color:#fff;}
  p.sub{color:rgba(255,255,255,0.9);margin:0;font-size:12.5px;}

  @media (min-width:820px){
    .wrap{max-width:960px;}
    header{padding:20px 40px;}
    .eyebrow{font-size:11px;padding:5px 12px;margin-bottom:9px;}
    h1{font-size:22px;margin-bottom:3px;}
    p.sub{font-size:13px;}
  }

  .panel{
    background:#fff;
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
  }
  label{font-size:13px;font-weight:600;display:block;margin-bottom:8px;}
  textarea{
    width:100%;
    min-height:90px;
    border:1px solid var(--line);
    border-radius:8px;
    padding:12px;
    font-family:var(--mono);
    font-size:13px;
    resize:vertical;
    background:#fdfbf8;
  }
  textarea:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .hint{font-size:12px;color:#a39a8d;margin-top:6px;}

  .row{display:flex;gap:10px;align-items:center;margin-top:14px;flex-wrap:wrap;}
  button{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
  }
  button:hover{background:var(--accent-dark);}
  button:disabled{background:#d8cfc4;cursor:not-allowed;}
  button.ghost{
    background:transparent;
    color:var(--ink);
    border:1px solid var(--line);
  }
  button.ghost:hover{background:#f3ede5;}

  .status-line{font-size:13px;color:#7a7268;}

  .summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
  .chip{
    font-family:var(--mono);
    font-size:12px;
    padding:6px 12px;
    border-radius:999px;
    border:1px solid var(--line);
    background:#fff;
  }
  .chip.found{color:var(--accent);border-color:var(--accent);}
  .chip.missing{color:var(--red-text);border-color:var(--red);}

  .missing-list{
    font-family:var(--mono);
    font-size:12px;
    color:var(--red-text);
    background:var(--red-soft);
    border-radius:8px;
    padding:10px 14px;
    margin-bottom:16px;
  }

  .cards{display:grid;grid-template-columns:1fr;gap:8px;}
  @media (min-width:820px){
    .cards{grid-template-columns:1fr 1fr;}
  }
  .card{
    background:#fff;
    border:1px solid var(--line);
    border-left:3px solid var(--accent);
    border-radius:12px;
    padding:12px 14px;
    min-width:0;
  }
  .card.status-delivered{border-left-color:var(--green);}
  .card.status-ongoing{border-left-color:#FFC629;}
  .card.status-retur{border-left-color:var(--red);}

  .card-head{display:flex;justify-content:space-between;align-items:center;}
  .resi-code{font-family:var(--mono);font-weight:700;font-size:14px;}
  .status-badge{
    font-size:10px;
    font-weight:800;
    text-transform:uppercase;
    padding:3px 9px;
    border-radius:999px;
    white-space:nowrap;
  }
  .status-delivered .status-badge{background:var(--green-soft);color:var(--green-text);}
  .status-ongoing .status-badge{background:var(--yellow-soft);color:var(--yellow-text);}
  .status-retur .status-badge{background:var(--red-soft);color:var(--red-text);}
  .status-other .status-badge{background:#eee;color:#666;}

  .card-subhead{display:flex;justify-content:space-between;align-items:center;margin-top:2px;}
  .card-date{font-size:10.5px;color:#a39a8d;}
  .card-price{font-size:12px;font-weight:700;}

  .card-namehp{font-size:12px;margin-top:9px;color:#4a453e;}
  .card-namehp .sep{color:#a39a8d;}

  .card-line{
    font-size:11px;
    color:#7a7268;
    margin-top:3px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .card-line.open{white-space:normal;overflow:visible;line-height:1.4;}

  .card-actions{
    display:flex;
    gap:6px;
    margin-top:10px;
  }
  .btn-action{
    flex:1;
    text-align:center;
    font-size:11px;
    font-weight:700;
    padding:7px 0;
    border-radius:8px;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:5px;
  }
  .btn-resi{border:1px solid var(--line);color:var(--ink);background:#fff;}
  .btn-resi:hover{background:#f3ede5;}
  .btn-wa{background:var(--wa);color:#fff;}
  .btn-wa:hover{background:#1ea952;}
  .btn-toggle{
    flex:0 0 32px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    border-radius:8px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .btn-toggle:hover{background:#f3ede5;}
  .btn-toggle svg{width:13px;height:13px;transition:transform .15s ease;}
  .btn-toggle.open svg{transform:rotate(180deg);}

  .empty{text-align:center;padding:40px 20px;color:#a39a8d;font-size:14px;}

  .setup-note{
    font-size:12px;
    color:#a39a8d;
    background:#fff;
    border:1px dashed var(--line);
    border-radius:8px;
    padding:10px 14px;
    margin-top:20px;
  }
  code{background:#f3ede5;padding:1px 5px;border-radius:4px;font-family:var(--mono);}
</style>
</head>
<body>
<header>
  <div class="eyebrow">Rahasia perusahaan</div>
  <h1>Cek Resi SPX Barranetmedia</h1>
  <p class="sub">Selamat berjuang, sukses....</p>
</header>
<div class="wrap">

  <div class="panel" id="loginPanel">
    <label>Login dengan akun Google yang sudah diizinkan</label>
    <div id="googleSignInBtn" style="margin-top:8px;"></div>
    <div class="status-line" id="loginStatus" style="margin-top:10px;"></div>
  </div>

  <div class="panel" id="searchPanel" style="display:none;">
    <label for="queryInput">Cari berdasarkan resi, nama, atau no HP</label>
    <textarea id="queryInput" placeholder="hariyanto&#10;81327700275&#10;SPXID06358221"></textarea>
    <div class="hint">Bisa cari banyak sekaligus, satu per baris atau dipisah koma. Boleh dicampur (resi + nama + HP).</div>
    <div class="row">
      <button id="searchBtn">Cari resi</button>
      <button class="ghost" id="clearBtn">Bersihkan</button>
      <span class="status-line" id="statusLine"></span>
    </div>
  </div>

  <div id="resultsArea"></div>

  <div class="setup-note" id="setupNote">
    ⚙️ Belum terhubung ke Google Sheet. Buka <code>index.html</code>, cari baris <code>const API_URL</code> dan <code>const GOOGLE_CLIENT_ID</code>, lalu isi keduanya.
  </div>
</div>

<script>
  // GANTI dengan URL Web App hasil deploy Apps Script kamu
  var API_URL = "https://script.google.com/macros/s/AKfycbyZo8dEMfDcS84-WDwZiZeZS-WzdAwLOAyr_lU1TAovOZdW7PV0Qh338mhNJRDOKua1oA/exec";
  // GANTI dengan Client ID dari Google Cloud Console (harus SAMA dengan yang di Code.gs)
  var GOOGLE_CLIENT_ID = "315770296664-pkethfkpdhd9bqj1lnjj0ec06eos8rlv.apps.googleusercontent.com";

  var ID_TOKEN = null;
  var expandedCards = {};
  var lastData = null;

  var queryInput = document.getElementById('queryInput');
  var searchBtn = document.getElementById('searchBtn');
  var clearBtn = document.getElementById('clearBtn');
  var statusLine = document.getElementById('statusLine');
  var resultsArea = document.getElementById('resultsArea');
  var setupNote = document.getElementById('setupNote');
  var loginPanel = document.getElementById('loginPanel');
  var searchPanel = document.getElementById('searchPanel');
  var loginStatus = document.getElementById('loginStatus');

  if (API_URL && API_URL !== "PASTE_URL_WEB_APP_DISINI") {
    setupNote.style.display = 'none';
  }

  window.onload = function () {
    if (typeof google === 'undefined') return;
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: handleGoogleSignIn,
      auto_select: true // otomatis login pakai akun terakhir tanpa perlu klik, kalau masih ada sesi Google aktif
    });
    google.accounts.id.renderButton(
      document.getElementById('googleSignInBtn'),
      { theme: 'outline', size: 'large', text: 'signin_with' }
    );
    google.accounts.id.prompt(); // coba login otomatis di background
  };

  function jsonpRequest(params, callback) {
    var callbackName = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
    window[callbackName] = function (data) {
      delete window[callbackName];
      document.body.removeChild(script);
      callback(null, data);
    };
    var query = Object.keys(params).map(function (k) {
      return k + '=' + encodeURIComponent(params[k]);
    }).join('&');
    var script = document.createElement('script');
    script.src = API_URL + '?' + query + '&callback=' + callbackName;
    script.onerror = function () {
      delete window[callbackName];
      document.body.removeChild(script);
      callback(new Error('Gagal memuat data dari server.'));
    };
    document.body.appendChild(script);
  }

  function handleGoogleSignIn(response) {
    ID_TOKEN = response.credential;
    loginStatus.textContent = 'Memeriksa akses...';

    jsonpRequest({ token: ID_TOKEN, q: '__cek_akses__' }, function (err, data) {
      if (err) {
        loginStatus.textContent = 'Gagal terhubung: ' + err.message;
        return;
      }
      if (!data.success) {
        loginStatus.textContent = data.error;
        ID_TOKEN = null;
        return;
      }
      loginPanel.style.display = 'none';
      searchPanel.style.display = '';
    });
  }

  clearBtn.addEventListener('click', function () {
    queryInput.value = '';
    resultsArea.innerHTML = '';
    statusLine.textContent = '';
  });

  searchBtn.addEventListener('click', searchResi);
  queryInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && e.ctrlKey) searchResi();
  });

  function statusClass(status) {
    var s = (status || '').toLowerCase();
    if (s.indexOf('deliver') !== -1) return 'status-delivered';
    if (s.indexOf('ongoing') !== -1 || s.indexOf('on going') !== -1 || s.indexOf('on-going') !== -1 || s.indexOf('proses') !== -1) return 'status-ongoing';
    if (s.indexOf('retur') !== -1) return 'status-retur';
    return 'status-other';
  }

  function buildWaMessage(item) {
    return "Halo Kak " + item.nama + " \uD83D\uDC4B\n\n" +
      "\uD83D\uDCE6 Nomor Resi Pesanan " + item.produk + ":\n" +
      item.resi + "\n\n" +
      "Mohon pastikan nomor resi pada paket sama dengan nomor di atas saat paket diterima.\n\n" +
      "Cek posisi paket di sini:\n" +
      item.linkResi + "\n\n" +
      "Terima kasih \uD83D\uDE4F";
  }

  function waLink(item) {
    var phone = String(item.noHp).replace(/\D/g, '');
    var normalized;
    if (phone.charAt(0) === '0') {
      normalized = '62' + phone.slice(1);
    } else if (phone.indexOf('62') === 0) {
      normalized = phone;
    } else {
      normalized = '62' + phone;
    }
    var msg = encodeURIComponent(buildWaMessage(item));
    return 'https://wa.me/' + normalized + '?text=' + msg;
  }

  function searchResi() {
    var raw = queryInput.value.trim();
    if (!raw) {
      statusLine.textContent = 'Masukkan minimal satu kata kunci.';
      return;
    }
    if (!API_URL || API_URL === "PASTE_URL_WEB_APP_DISINI") {
      statusLine.textContent = 'API belum disambungkan.';
      return;
    }

    searchBtn.disabled = true;
    statusLine.textContent = 'Mencari...';
    resultsArea.innerHTML = '';

    jsonpRequest({ token: ID_TOKEN, q: raw }, function (err, data) {
      searchBtn.disabled = false;
      if (err) {
        statusLine.textContent = 'Gagal terhubung ke server: ' + err.message;
        return;
      }
      if (!data.success) {
        statusLine.textContent = 'Terjadi kesalahan: ' + data.error;
        return;
      }
      statusLine.textContent = 'Ditemukan ' + data.total + ' hasil.';
      renderResults(data);
    });
  }

  function toggleCard(resiId) {
    expandedCards[resiId] = !expandedCards[resiId];
    if (lastData) renderResults(lastData);
  }

  function renderResults(data) {
    lastData = data;
    var html = '';

    html += '<div class="summary">' +
      '<div class="chip found">&#10003; Ditemukan: ' + data.total + '</div>' +
      (data.notFound.length > 0 ? '<div class="chip missing">&#10007; Tidak ditemukan: ' + data.notFound.length + '</div>' : '') +
      '</div>';

    if (data.notFound.length > 0) {
      html += '<div class="missing-list">Tidak ditemukan: ' + data.notFound.map(escapeHtml).join(', ') + '</div>';
    }

    if (data.data.length === 0) {
      html += '<div class="empty">Tidak ada data yang cocok.</div>';
    } else {
      html += '<div class="cards">';
      data.data.forEach(function (item) {
        var cls = statusClass(item.status);
        var isOpen = !!expandedCards[item.resi];
        var lineClass = isOpen ? ' open' : '';
        var hargaFmt = 'Rp' + Number(item.harga || 0).toLocaleString('id-ID');
        html += '<div class="card ' + cls + '">' +
          '<div class="card-head">' +
            '<span class="resi-code">' + escapeHtml(item.resi) + '</span>' +
            '<span class="status-badge">' + escapeHtml(item.status) + '</span>' +
          '</div>' +
          '<div class="card-subhead">' +
            '<span class="card-date">' + escapeHtml(item.tanggal) + '</span>' +
            '<span class="card-price">' + hargaFmt + '</span>' +
          '</div>' +
          '<div class="card-namehp">' + escapeHtml(item.nama) + ' <span class="sep">&bull;</span> ' + escapeHtml(item.noHp) + '</div>' +
          '<div class="card-line' + lineClass + '">' + escapeHtml(item.alamat) + '</div>' +
          '<div class="card-line' + lineClass + '">' + escapeHtml(item.produk) + '</div>' +
          '<div class="card-actions">' +
            (item.linkResi ? '<a class="btn-action btn-resi" href="' + item.linkResi + '" target="_blank">Lihat resi</a>' : '') +
            (item.noHp ? '<a class="btn-action btn-wa" href="' + waLink(item) + '" target="_blank"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38a9.9 9.9 0 0 0 4.74 1.21h.01c5.46 0 9.9-4.45 9.9-9.91C21.96 6.45 17.5 2 12.04 2zm5.8 14.16c-.24.68-1.4 1.3-1.93 1.38-.5.08-1.13.11-1.82-.12-.42-.13-.96-.31-1.65-.6-2.9-1.25-4.79-4.17-4.94-4.36-.14-.2-1.18-1.57-1.18-3 0-1.42.75-2.12 1.01-2.41.27-.29.58-.36.78-.36.2 0 .39 0 .56.01.18.01.42-.07.65.5.24.58.82 2 .89 2.15.07.14.12.31.02.5-.09.19-.14.31-.28.48-.14.16-.29.36-.42.48-.14.14-.28.29-.12.57.16.28.71 1.17 1.53 1.9 1.05.94 1.94 1.23 2.22 1.37.28.14.44.12.6-.07.16-.19.68-.79.87-1.06.18-.28.37-.23.62-.14.25.09 1.6.76 1.87.9.28.14.46.21.53.32.07.12.07.68-.17 1.36z"/></svg>WhatsApp</a>' : '') +
            '<button class="btn-toggle' + (isOpen ? ' open' : '') + '" onclick="toggleCard(\'' + item.resi.replace(/'/g, "\\'") + '\')" aria-label="' + (isOpen ? 'Tutup' : 'Lihat') + ' detail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></button>' +
          '</div>' +
        '</div>';
      });
      html += '</div>';
    }

    resultsArea.innerHTML = html;
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str == null ? '' : str;
    return div.innerHTML;
  }
</script>
</body>
</html>
